<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>スタート画面プレビュー A×D</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      color: #f8fafc;
      background: #020617;
    }

    /* ── 背景（案D） ── */
    .bg-gradient {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg, #020617 0%, #0f172a 50%, #020617 100%);
      z-index: 0;
    }

    /* ── モンスターシルエット（案D） ── */
    .silhouette {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 55%;
      z-index: 1;
      pointer-events: none;
    }

    /* ── 画面 ── */
    #screen-start {
      position: relative;
      z-index: 2;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 0;
    }

    /* ── ヘッダー小テキスト（案A構造・案D色） ── */
    .eyebrow {
      font-size: clamp(0.5rem, 1.2vw, 0.6rem);
      letter-spacing: 0.3em;
      color: #38bdf8;
      opacity: 0.6;
      margin-bottom: 16px;
      text-align: center;
      animation: fadein 0.6s ease both;
    }

    /* ── 仕切り線（案A） ── */
    .divider {
      width: min(380px, 90vw);
      height: 1px;
      background: linear-gradient(90deg, transparent, #1e3a5f, transparent);
      margin: 14px 0;
    }

    /* ── タイトル（案D色） ── */
    .mega-title {
      font-size: clamp(2rem, 8vw, 3.6rem);
      font-weight: 900;
      letter-spacing: 0.15em;
      background: linear-gradient(135deg, #ff6b35, #f7c948, #ff6b35);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s ease-in-out infinite, fadein 0.6s 0.1s ease both;
      text-align: center;
    }
    @keyframes shimmer {
      0%,100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }

    /* ── キャッチコピー（案A構造・案D色） ── */
    .catchphrase {
      display: flex;
      align-items: flex-end;
      gap: clamp(4px, 2vw, 12px);
    }

    .cp-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(5px, 1.2vw, 8px);
      animation: fadein 0.7s ease both;
    }
    .cp-item:nth-child(1) { animation-delay: 0.2s; }
    .cp-item:nth-child(3) { animation-delay: 0.35s; }
    .cp-item:nth-child(5) { animation-delay: 0.50s; }

    /* 読み：大きく・案D色（白→グレーグラデ） */
    .cp-reading {
      font-size: clamp(1.6rem, 5.5vw, 2.6rem);
      font-weight: 900;
      letter-spacing: 0.06em;
      background: linear-gradient(180deg, #f1f5f9 30%, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* 区切り線（案A） */
    .cp-line {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, #1e3a5f, transparent);
    }

    /* 漢字：小さく・グリッチ・案D色 */
    .cp-kanji {
      font-size: clamp(0.55rem, 1.3vw, 0.72rem);
      letter-spacing: 0.45em;
      text-indent: 0.45em;
      color: #334155;
      position: relative;
      display: inline-block;
    }
    .cp-kanji::before, .cp-kanji::after {
      content: attr(data-t);
      position: absolute;
      inset: 0;
      font-size: inherit;
      letter-spacing: inherit;
      text-indent: inherit;
    }
    .cp-kanji::before { color: #ff6b35; }
    .cp-kanji::after  { color: #38bdf8; }

    .cg1 { animation: glitch-base 3.5s steps(1) 0.0s infinite; }
    .cg1::before { animation: glitch-r 3.5s steps(1) 0.0s infinite; }
    .cg1::after  { animation: glitch-b 3.5s steps(1) 0.0s infinite; }
    .cg2 { animation: glitch-base 5.2s steps(1) 1.3s infinite; }
    .cg2::before { animation: glitch-r 5.2s steps(1) 1.3s infinite; }
    .cg2::after  { animation: glitch-b 5.2s steps(1) 1.3s infinite; }
    .cg3 { animation: glitch-base 4.1s steps(1) 2.7s infinite; }
    .cg3::before { animation: glitch-r 4.1s steps(1) 2.7s infinite; }
    .cg3::after  { animation: glitch-b 4.1s steps(1) 2.7s infinite; }

    @keyframes glitch-base {
      0%,86%,100% { transform: none; }
      87%  { transform: translate(-3px,1px) skewX(-2deg); }
      88%  { transform: translate(3px,-1px); }
      89%  { transform: none; }
      91%  { transform: translate(-1px); }
      92%  { transform: none; }
    }
    @keyframes glitch-r {
      0%,86%,100% { transform:none; clip-path:none; opacity:0; }
      87%  { clip-path:polygon(0 15%,100% 15%,100% 45%,0 45%); transform:translate(5px); opacity:1; }
      88%  { clip-path:polygon(0 55%,100% 55%,100% 70%,0 70%); transform:translate(-5px); opacity:1; }
      89%  { opacity:0; }
      91%  { clip-path:polygon(0 30%,100% 30%,100% 50%,0 50%); transform:translate(3px); opacity:.7; }
      92%  { opacity:0; }
    }
    @keyframes glitch-b {
      0%,86%,100% { transform:none; clip-path:none; opacity:0; }
      87%  { clip-path:polygon(0 50%,100% 50%,100% 75%,0 75%); transform:translate(-5px); opacity:1; }
      88%  { clip-path:polygon(0 10%,100% 10%,100% 30%,0 30%); transform:translate(4px); opacity:1; }
      89%  { opacity:0; }
      91%  { clip-path:polygon(0 65%,100% 65%,100% 85%,0 85%); transform:translate(-3px); opacity:.7; }
      92%  { opacity:0; }
    }

    .cp-sep {
      font-size: clamp(1rem, 3vw, 1.8rem);
      color: #0f172a;
      margin-bottom: clamp(14px, 3vw, 22px);
      user-select: none;
    }

    /* ── ボタン群（案D色） ── */
    .btn-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      animation: fadein 0.7s 0.6s ease both;
      opacity: 0;
    }

    .btn {
      padding: 13px 0;
      border: none;
      border-radius: 8px;
      font-weight: 800;
      font-size: clamp(0.85rem, 2.5vw, 1rem);
      letter-spacing: 0.15em;
      cursor: pointer;
      font-family: inherit;
      width: min(260px, 72vw);
    }

    .btn-start {
      background: linear-gradient(135deg, #1e3a5f, #1d4ed8);
      border: 1px solid rgba(59,130,246,0.4) !important;
      color: #fff;
      animation: btn-pulse 2s infinite;
    }
    @keyframes btn-pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(59,130,246,0.5); }
      70%      { box-shadow: 0 0 0 14px rgba(59,130,246,0); }
    }

    .btn-sub {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08) !important;
      color: #475569;
      font-size: clamp(0.75rem, 2vw, 0.85rem);
    }

    /* ── フッター小テキスト（案A） ── */
    .footer-text {
      font-size: clamp(0.45rem, 1vw, 0.55rem);
      letter-spacing: 0.22em;
      color: #1e293b;
      margin-top: 16px;
      text-align: center;
      animation: fadein 0.6s 0.8s ease both;
      opacity: 0;
    }

    @keyframes fadein {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: none; }
    }
  </style>
</head>
<body>

  <!-- 背景：案D -->
  <div class="bg-gradient"></div>

  <!-- モンスターシルエット：案D -->
  <svg class="silhouette" viewBox="0 0 1200 480" preserveAspectRatio="xMidYMax meet" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="fade-top" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#1e3a8a" stop-opacity="0"/>
        <stop offset="50%" stop-color="#1e3a8a" stop-opacity="0.12"/>
        <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0.2"/>
      </linearGradient>
    </defs>

    <!-- 左端：小さいモンスター -->
    <g opacity="0.13" fill="#60a5fa">
      <rect x="80" y="340" width="64" height="52" rx="6"/>
      <rect x="92" y="298" width="40" height="46" rx="6"/>
      <rect x="68"  y="384" width="16" height="36"/>
      <rect x="136" y="384" width="16" height="36"/>
      <circle cx="104" cy="312" r="6" fill="#020617"/>
      <circle cx="120" cy="312" r="6" fill="#020617"/>
    </g>

    <!-- 左寄り：縦長モンスター -->
    <g opacity="0.10" fill="#818cf8">
      <rect x="260" y="290" width="52" height="80" rx="8"/>
      <rect x="272" y="248" width="28" height="46" rx="6"/>
      <rect x="248" y="360" width="14" height="44"/>
      <rect x="310" y="360" width="14" height="44"/>
      <rect x="234" y="308" width="10" height="28" rx="4"/>
      <circle cx="282" cy="262" r="6" fill="#020617"/>
      <circle cx="298" cy="262" r="6" fill="#020617"/>
    </g>

    <!-- 中央：最大・どっしり -->
    <g opacity="0.18" fill="#6366f1">
      <ellipse cx="600" cy="390" rx="72" ry="56"/>
      <ellipse cx="600" cy="328" rx="52" ry="46"/>
      <rect x="536" y="434" width="22" height="46" rx="6"/>
      <rect x="642" y="434" width="22" height="46" rx="6"/>
      <rect x="518" y="344" width="14" height="36" rx="4"/>
      <rect x="668" y="344" width="14" height="36" rx="4"/>
      <circle cx="586" cy="324" r="8" fill="#020617"/>
      <circle cx="614" cy="324" r="8" fill="#020617"/>
      <!-- 角 -->
      <polygon points="582,296 576,268 592,280"/>
      <polygon points="618,296 624,268 608,280"/>
    </g>

    <!-- 右寄り：四角いカラクリ風 -->
    <g opacity="0.10" fill="#38bdf8">
      <rect x="840" y="300" width="60" height="70" rx="4"/>
      <rect x="848" y="262" width="44" height="42" rx="4"/>
      <rect x="828" y="362" width="14" height="40"/>
      <rect x="898" y="362" width="14" height="40"/>
      <rect x="900" y="310" width="12" height="30" rx="3"/>
      <!-- アンテナ -->
      <rect x="862" y="244" width="4" height="20"/>
      <rect x="874" y="244" width="4" height="20"/>
      <circle cx="864" cy="244" r="4" fill="#38bdf8"/>
      <circle cx="876" cy="244" r="4" fill="#38bdf8"/>
      <circle cx="862" cy="278" r="5" fill="#020617"/>
      <circle cx="878" cy="278" r="5" fill="#020617"/>
    </g>

    <!-- 右端：小さいモンスター -->
    <g opacity="0.12" fill="#a78bfa">
      <rect x="1056" y="350" width="56" height="46" rx="6"/>
      <rect x="1066" y="312" width="36" height="42" rx="6"/>
      <rect x="1044" y="388" width="14" height="32"/>
      <rect x="1108" y="388" width="14" height="32"/>
      <circle cx="1078" cy="326" r="5" fill="#020617"/>
      <circle cx="1092" cy="326" r="5" fill="#020617"/>
    </g>

    <!-- 地面フェード -->
    <rect x="0" y="360" width="1200" height="120" fill="url(#fade-top)"/>
  </svg>

  <!-- メイン画面：案Aレイアウト・案D色 -->
  <section id="screen-start">
    <p class="eyebrow">BEAST TAKER GUILD &nbsp;/&nbsp; AUTHORIZED</p>

    <h1 class="mega-title">MONSTER ROGUE</h1>

    <div class="divider"></div>

    <div class="catchphrase">
      <div class="cp-item">
        <span class="cp-reading">育てて</span>
        <div class="cp-line"></div>
        <span class="cp-kanji cg1" data-t="育成">育成</span>
      </div>
      <span class="cp-sep">·</span>
      <div class="cp-item">
        <span class="cp-reading">組んで</span>
        <div class="cp-line"></div>
        <span class="cp-kanji cg2" data-t="構築">構築</span>
      </div>
      <span class="cp-sep">·</span>
      <div class="cp-item">
        <span class="cp-reading">戦って</span>
        <div class="cp-line"></div>
        <span class="cp-kanji cg3" data-t="戦闘">戦闘</span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="btn-group">
      <button class="btn btn-start">START GAME</button>
      <button class="btn btn-sub">♪ SOUND TEST</button>
    </div>

    <p class="footer-text">SYS ver.1.0 &nbsp;/&nbsp; BEAST TAKER GUILD</p>
  </section>

</body>
</html>
