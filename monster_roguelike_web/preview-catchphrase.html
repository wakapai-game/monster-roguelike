<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>キャッチコピー プレビュー</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0f1e;
      color: #e2e8f0;
      font-family: 'Courier New', monospace;
      padding: 48px 24px 80px;
    }

    h2.label {
      font-size: 0.7rem;
      letter-spacing: 0.25em;
      color: #334155;
      text-align: center;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .preview-block {
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 16px;
      padding: 56px 32px;
      margin-bottom: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      min-height: 180px;
    }

    /* subtle grid background */
    .preview-block::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    /* ══════════════════════════════════════════
       案1：逆ルビ ── 読みを主役に
    ══════════════════════════════════════════ */
    .cp1 {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: cp1-fadein 0.6s ease both;
    }
    @keyframes cp1-fadein {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: none; }
    }

    .cp1-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      animation: cp1-fadein 0.6s ease both;
    }
    .cp1-item:nth-child(1) { animation-delay: 0s; }
    .cp1-item:nth-child(3) { animation-delay: 0.15s; }
    .cp1-item:nth-child(5) { animation-delay: 0.30s; }

    .cp1-reading {
      font-size: 2.6rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      background: linear-gradient(135deg, #f1f5f9 30%, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .cp1-line {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, #475569, transparent);
    }

    .cp1-kanji {
      font-size: 0.65rem;
      letter-spacing: 0.5em;
      color: #475569;
      text-indent: 0.5em;
    }

    .cp1-sep {
      font-size: 2rem;
      color: #1e293b;
      margin-bottom: 24px;
      user-select: none;
    }


    /* ══════════════════════════════════════════
       案2：ネオン縦スタック
    ══════════════════════════════════════════ */
    .cp2 {
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-width: 260px;
    }

    .cp2-item {
      display: flex;
      flex-direction: column;
      gap: 3px;
      animation: cp2-slide 0.5s ease both;
    }
    .cp2-item:nth-child(1) { animation-delay: 0.0s; }
    .cp2-item:nth-child(2) { animation-delay: 0.15s; }
    .cp2-item:nth-child(3) { animation-delay: 0.30s; }
    @keyframes cp2-slide {
      from { opacity: 0; transform: translateX(-16px); }
      to   { opacity: 1; transform: none; }
    }

    .cp2-reading {
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      padding-left: 20px;
      opacity: 0.7;
    }

    .cp2-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .cp2-bar {
      width: 4px;
      height: 40px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .cp2-kanji {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: 0.5em;
    }

    /* 色バリアント */
    .cp2-g .cp2-reading { color: #00ff88; }
    .cp2-g .cp2-bar { background: #00ff88; box-shadow: 0 0 12px #00ff88, 0 0 24px #00ff8860; animation: pulse-g 2.4s ease-in-out infinite; }
    .cp2-g .cp2-kanji { color: #00ff88; text-shadow: 0 0 16px #00ff8880, 0 0 40px #00ff8840; }

    .cp2-b .cp2-reading { color: #38bdf8; }
    .cp2-b .cp2-bar { background: #38bdf8; box-shadow: 0 0 12px #38bdf8, 0 0 24px #38bdf860; animation: pulse-b 2.8s ease-in-out infinite; }
    .cp2-b .cp2-kanji { color: #38bdf8; text-shadow: 0 0 16px #38bdf880, 0 0 40px #38bdf840; }

    .cp2-r .cp2-reading { color: #ff6b35; }
    .cp2-r .cp2-bar { background: #ff6b35; box-shadow: 0 0 12px #ff6b35, 0 0 24px #ff6b3560; animation: pulse-r 3.2s ease-in-out infinite; }
    .cp2-r .cp2-kanji { color: #ff6b35; text-shadow: 0 0 16px #ff6b3580, 0 0 40px #ff6b3540; }

    @keyframes pulse-g { 0%,100%{opacity:1} 50%{opacity:0.65} }
    @keyframes pulse-b { 0%,100%{opacity:1} 50%{opacity:0.65} }
    @keyframes pulse-r { 0%,100%{opacity:1} 50%{opacity:0.65} }


    /* ══════════════════════════════════════════
       案3：シネマ横並び
    ══════════════════════════════════════════ */
    .cp3 {
      display: flex;
      justify-content: center;
    }

    .cp3-item {
      padding: 20px 40px;
      text-align: center;
      position: relative;
      animation: cp3-reveal 0.6s ease both;
    }
    .cp3-item:nth-child(1) { animation-delay: 0.0s; }
    .cp3-item:nth-child(2) { animation-delay: 0.2s; }
    .cp3-item:nth-child(3) { animation-delay: 0.4s; }
    @keyframes cp3-reveal {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* 上下のライン（clip-path でスライドイン） */
    .cp3-item::before,
    .cp3-item::after {
      content: '';
      position: absolute;
      left: 10%;
      width: 80%;
      height: 1px;
      background: #334155;
    }
    .cp3-item::before { top: 0; }
    .cp3-item::after  { bottom: 0; }

    .cp3-item + .cp3-item {
      border-left: 1px solid #1e293b;
    }

    .cp3-num {
      font-size: 0.55rem;
      letter-spacing: 0.3em;
      color: #334155;
      margin-bottom: 12px;
    }

    .cp3-reading {
      font-size: 1.4rem;
      letter-spacing: 0.12em;
      color: #cbd5e1;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .cp3-kanji {
      font-size: 0.6rem;
      letter-spacing: 0.55em;
      color: #334155;
      text-indent: 0.55em;
    }


    /* ══════════════════════════════════════════
       案4：グリッチ（各単語が独自タイミングでずれる）
    ══════════════════════════════════════════ */
    .cp4 {
      display: flex;
      justify-content: center;
      gap: 48px;
      align-items: center;
    }

    .cp4-item {
      text-align: center;
    }

    .cp4-reading {
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      color: #475569;
      margin-bottom: 6px;
    }

    .cp4-kanji {
      font-size: 2.6rem;
      font-weight: 900;
      letter-spacing: 0.15em;
      color: #f1f5f9;
      position: relative;
      display: inline-block;
    }

    /* グリッチ用の疑似要素 */
    .cp4-kanji::before,
    .cp4-kanji::after {
      content: attr(data-t);
      position: absolute;
      inset: 0;
    }
    .cp4-kanji::before { color: #ff6b35; }
    .cp4-kanji::after  { color: #38bdf8; }

    /* 育成：3秒周期 */
    .g1 { animation: glitch-base 3s steps(1) infinite; }
    .g1::before { animation: glitch-r 3s steps(1) infinite; }
    .g1::after  { animation: glitch-b 3s steps(1) infinite; }

    /* 構築：5秒周期（少しずらす） */
    .g2 { animation: glitch-base 5s steps(1) 1.1s infinite; }
    .g2::before { animation: glitch-r 5s steps(1) 1.1s infinite; }
    .g2::after  { animation: glitch-b 5s steps(1) 1.1s infinite; }

    /* 戦闘：4秒周期（さらにずらす） */
    .g3 { animation: glitch-base 4s steps(1) 2.3s infinite; }
    .g3::before { animation: glitch-r 4s steps(1) 2.3s infinite; }
    .g3::after  { animation: glitch-b 4s steps(1) 2.3s infinite; }

    @keyframes glitch-base {
      0%,86%,100% { transform: none; }
      87%  { transform: translate(-3px, 1px) skewX(-2deg); }
      88%  { transform: translate(3px, -1px); }
      89%  { transform: none; }
      91%  { transform: translate(-1px); }
      92%  { transform: none; }
    }
    @keyframes glitch-r {
      0%,86%,100% { transform: none; clip-path: none; opacity: 0; }
      87%  { clip-path: polygon(0 15%,100% 15%,100% 45%,0 45%); transform: translate(4px); opacity: 1; }
      88%  { clip-path: polygon(0 55%,100% 55%,100% 70%,0 70%); transform: translate(-4px); opacity: 1; }
      89%  { opacity: 0; }
      91%  { clip-path: polygon(0 30%,100% 30%,100% 50%,0 50%); transform: translate(2px); opacity: 0.7; }
      92%  { opacity: 0; }
    }
    @keyframes glitch-b {
      0%,86%,100% { transform: none; clip-path: none; opacity: 0; }
      87%  { clip-path: polygon(0 50%,100% 50%,100% 75%,0 75%); transform: translate(-4px); opacity: 1; }
      88%  { clip-path: polygon(0 10%,100% 10%,100% 30%,0 30%); transform: translate(3px); opacity: 1; }
      89%  { opacity: 0; }
      91%  { clip-path: polygon(0 65%,100% 65%,100% 85%,0 85%); transform: translate(-2px); opacity: 0.7; }
      92%  { opacity: 0; }
    }


    /* ══════════════════════════════════════════
       案5：縦書き3列
    ══════════════════════════════════════════ */
    .cp5 {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0;
    }

    .cp5-col {
      writing-mode: vertical-rl;
      text-orientation: mixed;
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 10px;
      padding: 0 28px;
      animation: cp5-drop 0.7s ease both;
    }
    .cp5-col:nth-child(1) { animation-delay: 0.05s; }
    .cp5-col:nth-child(3) { animation-delay: 0.20s; }
    .cp5-col:nth-child(5) { animation-delay: 0.35s; }
    @keyframes cp5-drop {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: none; }
    }

    .cp5-reading {
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      color: #475569;
    }

    .cp5-kanji {
      font-size: 2.4rem;
      font-weight: 900;
      letter-spacing: 0.15em;
      color: #f1f5f9;
    }

    .cp5-div {
      width: 1px;
      height: 90px;
      background: linear-gradient(to bottom, transparent, #334155, transparent);
      writing-mode: horizontal-tb;
    }

    /* ══════════════════════════════════════════
       案6：逆ルビ＋グリッチ COMBO
    ══════════════════════════════════════════ */
    .cp6 {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    .cp6-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      animation: cp1-fadein 0.6s ease both;
    }
    .cp6-item:nth-child(1) { animation-delay: 0.0s; }
    .cp6-item:nth-child(3) { animation-delay: 0.18s; }
    .cp6-item:nth-child(5) { animation-delay: 0.36s; }

    /* 読み：案1と同じ大きな文字 */
    .cp6-reading {
      font-size: 2.6rem;
      font-weight: 900;
      letter-spacing: 0.08em;
      background: linear-gradient(135deg, #f1f5f9 30%, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* 区切り線 */
    .cp6-line {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, #475569, transparent);
    }

    /* 漢字：小さく＋グリッチ */
    .cp6-kanji {
      font-size: 0.7rem;
      letter-spacing: 0.55em;
      text-indent: 0.55em;
      color: #94a3b8;
      position: relative;
      display: inline-block;
    }
    .cp6-kanji::before,
    .cp6-kanji::after {
      content: attr(data-t);
      position: absolute;
      inset: 0;
      font-size: inherit;
      letter-spacing: inherit;
      text-indent: inherit;
    }
    .cp6-kanji::before { color: #ff6b35; }
    .cp6-kanji::after  { color: #38bdf8; }

    /* 各単語を独立したタイミングでグリッチ */
    .cg1 { animation: glitch-base 3.5s steps(1) 0.0s infinite; }
    .cg1::before { animation: glitch-r 3.5s steps(1) 0.0s infinite; }
    .cg1::after  { animation: glitch-b 3.5s steps(1) 0.0s infinite; }

    .cg2 { animation: glitch-base 5.2s steps(1) 1.3s infinite; }
    .cg2::before { animation: glitch-r 5.2s steps(1) 1.3s infinite; }
    .cg2::after  { animation: glitch-b 5.2s steps(1) 1.3s infinite; }

    .cg3 { animation: glitch-base 4.1s steps(1) 2.7s infinite; }
    .cg3::before { animation: glitch-r 4.1s steps(1) 2.7s infinite; }
    .cg3::after  { animation: glitch-b 4.1s steps(1) 2.7s infinite; }

    .cp6-sep {
      font-size: 2rem;
      color: #1e293b;
      margin-bottom: 28px;
      user-select: none;
    }

  </style>
</head>
<body>

  <!-- 案1 -->
  <h2 class="label">案1 ─── 逆ルビ（読みを大きく）</h2>
  <div class="preview-block">
    <div class="cp1">
      <div class="cp1-item">
        <span class="cp1-reading">育てて</span>
        <div class="cp1-line"></div>
        <span class="cp1-kanji">育成</span>
      </div>
      <span class="cp1-sep">・</span>
      <div class="cp1-item">
        <span class="cp1-reading">組んで</span>
        <div class="cp1-line"></div>
        <span class="cp1-kanji">構築</span>
      </div>
      <span class="cp1-sep">・</span>
      <div class="cp1-item">
        <span class="cp1-reading">戦って</span>
        <div class="cp1-line"></div>
        <span class="cp1-kanji">戦闘</span>
      </div>
    </div>
  </div>

  <!-- 案2 -->
  <h2 class="label">案2 ─── ネオン縦スタック（グロー＋パルス）</h2>
  <div class="preview-block">
    <div class="cp2">
      <div class="cp2-item cp2-g">
        <span class="cp2-reading">育てて</span>
        <div class="cp2-row">
          <div class="cp2-bar"></div>
          <span class="cp2-kanji">育成</span>
        </div>
      </div>
      <div class="cp2-item cp2-b">
        <span class="cp2-reading">組んで</span>
        <div class="cp2-row">
          <div class="cp2-bar"></div>
          <span class="cp2-kanji">構築</span>
        </div>
      </div>
      <div class="cp2-item cp2-r">
        <span class="cp2-reading">戦って</span>
        <div class="cp2-row">
          <div class="cp2-bar"></div>
          <span class="cp2-kanji">戦闘</span>
        </div>
      </div>
    </div>
  </div>

  <!-- 案3 -->
  <h2 class="label">案3 ─── シネマ横並び（番号・上下ライン）</h2>
  <div class="preview-block">
    <div class="cp3">
      <div class="cp3-item">
        <div class="cp3-num">01</div>
        <div class="cp3-reading">育てて</div>
        <div class="cp3-kanji">育成</div>
      </div>
      <div class="cp3-item">
        <div class="cp3-num">02</div>
        <div class="cp3-reading">組んで</div>
        <div class="cp3-kanji">構築</div>
      </div>
      <div class="cp3-item">
        <div class="cp3-num">03</div>
        <div class="cp3-reading">戦って</div>
        <div class="cp3-kanji">戦闘</div>
      </div>
    </div>
  </div>

  <!-- 案4 -->
  <h2 class="label">案4 ─── グリッチ（各単語が独自タイミングで乱れる）</h2>
  <div class="preview-block">
    <div class="cp4">
      <div class="cp4-item">
        <div class="cp4-reading">育てて</div>
        <div class="cp4-kanji g1" data-t="育成">育成</div>
      </div>
      <div class="cp4-item">
        <div class="cp4-reading">組んで</div>
        <div class="cp4-kanji g2" data-t="構築">構築</div>
      </div>
      <div class="cp4-item">
        <div class="cp4-reading">戦って</div>
        <div class="cp4-kanji g3" data-t="戦闘">戦闘</div>
      </div>
    </div>
  </div>

  <!-- 案5 -->
  <h2 class="label">案5 ─── 縦書き3列</h2>
  <div class="preview-block">
    <div class="cp5">
      <div class="cp5-col">
        <span class="cp5-reading">育てて</span>
        <span class="cp5-kanji">育成</span>
      </div>
      <div class="cp5-div"></div>
      <div class="cp5-col">
        <span class="cp5-reading">組んで</span>
        <span class="cp5-kanji">構築</span>
      </div>
      <div class="cp5-div"></div>
      <div class="cp5-col">
        <span class="cp5-reading">戦って</span>
        <span class="cp5-kanji">戦闘</span>
      </div>
    </div>
  </div>

  <!-- 案6 COMBO -->
  <h2 class="label">案6 ─── 逆ルビ＋グリッチ COMBO（推し）</h2>
  <div class="preview-block">
    <div class="cp6">
      <div class="cp6-item">
        <span class="cp6-reading">育てて</span>
        <div class="cp6-line"></div>
        <span class="cp6-kanji cg1" data-t="育成">育成</span>
      </div>
      <span class="cp6-sep">・</span>
      <div class="cp6-item">
        <span class="cp6-reading">組んで</span>
        <div class="cp6-line"></div>
        <span class="cp6-kanji cg2" data-t="構築">構築</span>
      </div>
      <span class="cp6-sep">・</span>
      <div class="cp6-item">
        <span class="cp6-reading">戦って</span>
        <div class="cp6-line"></div>
        <span class="cp6-kanji cg3" data-t="戦闘">戦闘</span>
      </div>
    </div>
  </div>

</body>
</html>
